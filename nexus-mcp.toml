# Runner configuration for nexus-mcp.
# Optional — the server runs without this file.
#
# Location resolution:
#   1. NEXUS_CONFIG_PATH env var (absolute path)
#   2. nexus-mcp.toml in current working directory
#
# ─────────────────────────────────────────────────────────────
# [defaults]  —  Global operational defaults for all runners.
#
# All fields are optional. Env vars have highest priority,
# then TOML [runner.<name>] overrides, then these globals.
# Hardcoded fallbacks apply when nothing else is set.
#
# [defaults]
# timeout            = 600    # Max subprocess wall-clock time (seconds, ge=1)
# output_limit       = 50000  # Max response chars before truncation (bytes, ge=1)
# max_retries        = 3      # Total attempts including first (ge=1)
# retry_base_delay   = 2.0    # Exponential backoff base (seconds, ge=0; 0 = instant)
# retry_max_delay    = 60.0   # Backoff ceiling (seconds, ge=0)
# tool_timeout       = 900.0  # MCP tool call timeout (seconds, ge=0)
# execution_mode     = "default"  # "default" or "yolo"
# model              = "gemini-2.5-flash"  # Default model passed to --model flag (min 1 char)
# ─────────────────────────────────────────────────────────────
#
# [runner.<name>]  —  Provider metadata + per-runner operational overrides.
# Supports all [defaults] fields above, plus:
#   provider  (str)       —  display name shown by list_runners
#   models    (str[])     —  known model IDs shown by list_runners
#   cli_path  (str)       —  override binary path (prefer NEXUS_<AGENT>_PATH env var)

[runner.gemini]
provider = "google"
models = ["gemini-2.5-flash", "gemini-2.5-pro"]

[runner.claude]
provider = "anthropic"
models = ["claude-opus-4-6", "claude-sonnet-4-6", "claude-haiku-4-5"]

[runner.codex]
provider = "openai"
models = ["o3", "o4-mini", "codex-mini-latest"]

[runner.opencode]
provider = "multi"
models = ["anthropic/claude-sonnet-4-6", "openai/gpt-4o", "google/gemini-2.5-flash"]
