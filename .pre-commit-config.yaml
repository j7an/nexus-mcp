repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy src/nexus_mcp
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0  # Latest stable (Feb 2026)
    hooks:
      # File quality checks
      - id: trailing-whitespace
      - id: end-of-file-fixer

      # Syntax validation
      - id: check-yaml
      - id: check-toml  # Validates pyproject.toml
      - id: check-ast   # Validates Python syntax

      # Guard rails
      - id: check-added-large-files
        args: ['--maxkb=500']  # Prevents files >500KB
      - id: check-merge-conflict  # Catches unresolved conflicts
      - id: mixed-line-ending     # Enforces consistent line endings
