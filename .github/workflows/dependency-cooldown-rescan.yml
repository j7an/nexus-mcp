name: Dependency Cool-Down Rescan

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, log decisions but skip gh run rerun"
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read
  actions: write
  statuses: read

jobs:
  rescan:
    uses: j7an/shared-workflows/.github/workflows/cooldown-rescan.yml@c092d60b64e29d03b67d49e8a8471bdfd61cee5a # v2.5.1
    with:
      dry_run: ${{ inputs.dry_run || false }}
