name: Dependency Cool-Down

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: cooldown-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cooldown:
    uses: j7an/shared-workflows/.github/workflows/dependency-cooldown.yml@f8d50abc2805425906ef567df64d4ffabff4341f # v2.0.1
    with:
      auto_merge: true
