name: Dependency Cool-Down

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: cooldown-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cooldown:
    uses: j7an/shared-workflows/.github/workflows/dependency-cooldown.yml@63d902124965191252737b399960e46f2f63e26a # v2.0.3
    with:
      auto_merge: true
      cooldown_days: 7
