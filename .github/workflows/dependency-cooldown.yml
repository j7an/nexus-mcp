name: Dependency Cool-Down

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: cooldown-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cooldown:
    uses: j7an/shared-workflows/.github/workflows/dependency-cooldown.yml@c092d60b64e29d03b67d49e8a8471bdfd61cee5a # v2.5.1
    with:
      auto_merge: true
      cooldown_days: 7
