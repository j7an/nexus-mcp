name: Dependency Cool-Down

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  statuses: write
  issues: write

concurrency:
  group: cooldown-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cooldown:
    uses: j7an/shared-workflows/.github/workflows/dependency-cooldown.yml@16b94fd3461af6e9fe6e6174d805c7879fb39bb4 # v2.0.2
    with:
      auto_merge: true
      cooldown_days: 7
