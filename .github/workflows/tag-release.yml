name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (auto = infer from Conventional Commits since last tag)"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  tag:
    uses: j7an/shared-workflows/.github/workflows/tag-release.yml@c092d60b64e29d03b67d49e8a8471bdfd61cee5a # v2.5.1
    with:
      bump: ${{ inputs.bump }}
      tag-prefix: "v"
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
