name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (auto = infer from Conventional Commits since last tag)"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  tag:
    uses: j7an/shared-workflows/.github/workflows/tag-release.yml@29bcd576f856e85042ab699dce66523711a44b48 # v3.0.2
    with:
      bump: ${{ inputs.bump }}
      tag-prefix: "v"
    secrets:
      RELEASE_BOT_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
