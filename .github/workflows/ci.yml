name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv lock
      - name: Commit updated lockfile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet uv.lock; then
            echo "No lockfile changes"
            exit 0
          fi
          CONTENT=$(base64 -w0 uv.lock)
          HEAD_OID=$(git rev-parse HEAD)
          gh api graphql -f query='
            mutation($input: CreateCommitOnBranchInput!) {
              createCommitOnBranch(input: $input) {
                commit { url }
              }
            }
          ' -f "input[branchRef][repositoryNameWithOwner]=${{ github.repository }}" \
            -f "input[branchRef][branchName]=${{ github.head_ref }}" \
            -f "input[expectedHeadOid]=${HEAD_OID}" \
            -f "input[message][headline]=deps: update uv.lock" \
            -f "input[fileChanges][additions][0][path]=uv.lock" \
            -f "input[fileChanges][additions][0][contents]=${CONTENT}"

  test:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13", "3.14"]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest -m "not integration" --cov=nexus_mcp --cov-report=term-missing --cov-report=xml -v
      - name: Check diff coverage
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run diff-cover coverage.xml --fail-under=90 --compare-branch=origin/${{ github.base_ref }}

  lint:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
      - uses: ./.github/actions/setup-uv
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
      - uses: ./.github/actions/setup-uv
      - name: Mypy
        run: uv run mypy src/nexus_mcp
