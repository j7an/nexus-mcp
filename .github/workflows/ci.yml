name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
      - uses: astral-sh/setup-uv@v7
      - run: uv lock
      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --cached --quiet || git commit -m "deps: update uv.lock"
          git push

  test:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest -m "not integration" --cov=nexus_mcp --cov-report=term-missing --cov-report=xml -v
      - name: Check diff coverage
        if: github.event_name == 'pull_request' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: uv run diff-cover coverage.xml --fail-under=90 --compare-branch=origin/${{ github.base_ref }}

  lint:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
      - uses: ./.github/actions/setup-uv
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    needs: [update-lockfile]
    if: ${{ !cancelled() && needs.update-lockfile.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.actor == 'dependabot[bot]' && github.head_ref || '' }}
      - uses: ./.github/actions/setup-uv
      - name: Mypy
        run: uv run mypy src/nexus_mcp
