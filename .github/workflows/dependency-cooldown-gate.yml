name: Dependency Cool-Down Gate

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    uses: j7an/shared-workflows/.github/workflows/dependency-cooldown-gate.yml@72e54204a9d6cd988e43b95e74d155cf797c0617 # v1.3.2
    with:
      cooling_business_days: 5
      create_tracking_issue: false
