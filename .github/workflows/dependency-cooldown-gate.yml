name: Dependency Cool-Down Gate

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BYPASS_LABEL: "security-bypass-cooling"

jobs:
  set-pending-status:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2
        with:
          egress-policy: audit

      - name: Set cooldown status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [[ "$ACTOR" != "dependabot[bot]" && "$ACTOR" != "renovate[bot]" ]]; then
            STATE="success"
            DESC="Non-bot PR — no cool-down required"
          else
            # Check for bypass label
            HAS_BYPASS=$(gh pr view "$PR_NUMBER" --repo "$REPOSITORY" --json labels \
              --jq "[.labels[]?.name] | any(. == \"$BYPASS_LABEL\")")
            if [[ "$HAS_BYPASS" == "true" ]]; then
              STATE="success"
              DESC="Cooling bypassed via $BYPASS_LABEL label"
            else
              STATE="pending"
              DESC="Security cool-down: merge allowed after 5 business days + exploit scan"
            fi
          fi
          gh api "repos/${REPOSITORY}/statuses/${HEAD_SHA}" \
            -f state="$STATE" \
            -f context="dependency-cooldown / gate" \
            -f description="$DESC"
