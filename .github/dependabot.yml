version: 2
updates:
  # GitHub Actions (SHA-pinned, updated by Dependabot)
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "America/Los_Angeles"
    groups:
      all-actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps"

  # Python dependencies (uv ecosystem)
  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
      day: "monday"
      time: "18:00"
      timezone: "America/Los_Angeles"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 10
